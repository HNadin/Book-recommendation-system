[flake8]
max-line-length = 119
exclude =
    .git,
    __pycache__,
    migrations,
    assets,
    static,
    .venv,
    venv
ignore =
    # line break before binary operator (conflicts with black style)
    W503,
    # line break after binary operator
    W504
per-file-ignores =
    # allow unused imports in __init__ files
    __init__.py: F401

[isort]
profile = black
line_length = 119
skip = migrations
known_django = django
known_third_party = rest_framework,pandas,numpy,scipy,sklearn,surprise,torch,plotly,vaderSentiment,textblob
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

[pylint.MASTER]
load-plugins = pylint_django
django-settings-module = yash.settings

[pylint.FORMAT]
max-line-length = 119

[pylint.MESSAGES CONTROL]
disable =
    C0114,
    C0115,
    C0116,
    C0103,
    C0415,
    E0401,
    R0402,
    R0903,
    R0913,
    R0914,
    R0917,
    W0212,
    W0613,
    W0718
