{% comment %}
Мінімальні кнопки оцінювання для карток.
Параметри: isbn, user_rating (int або None), large (bool)
{% endcomment %}
<div style="display:flex;gap:4px;margin-top:5px;justify-content:center;">
  <button class="rate-mini {% if user_rating >= 7 %}active{% endif %}"
          data-isbn="{{ isbn }}" data-rating="8"
          onclick="rate('{{ isbn }}', {% if user_rating == 8 %}null{% else %}8{% endif %})"
          title="Подобається" style="{% if user_rating >= 7 %}background:rgba(34,197,94,.25);border-color:#22c55e;{% endif %}">
    👍
  </button>
  <button class="rate-mini {% if user_rating and user_rating >= 4 and user_rating < 7 %}active{% endif %}"
          data-isbn="{{ isbn }}" data-rating="5"
          onclick="rate('{{ isbn }}', {% if user_rating == 5 %}null{% else %}5{% endif %})"
          title="Нейтрально" style="{% if user_rating and user_rating >= 4 and user_rating < 7 %}background:rgba(245,158,11,.2);border-color:#f59e0b;{% endif %}">
    😐
  </button>
  <button class="rate-mini {% if user_rating and user_rating < 4 %}active{% endif %}"
          data-isbn="{{ isbn }}" data-rating="2"
          onclick="rate('{{ isbn }}', {% if user_rating == 2 %}null{% else %}2{% endif %})"
          title="Не подобається" style="{% if user_rating and user_rating < 4 %}background:rgba(239,68,68,.2);border-color:#ef4444;{% endif %}">
    👎
  </button>
</div>
<style>
  .rate-mini {
    background: none;
    border: 1px solid #374151;
    border-radius: 6px;
    font-size: .9rem;
    padding: 1px 5px;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .1s;
    line-height: 1.4;
  }
  .rate-mini:hover { transform: scale(1.2); }
</style>
