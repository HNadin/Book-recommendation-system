{% comment %}
Компактний рейтинг 1–10 для карток.
Параметри: isbn, user_rating (int або None)
{% endcomment %}
<div class="rating-strip" data-isbn="{{ isbn }}">
  {% for i in "1234567890" %}
  {% with num=forloop.counter %}
  <button class="rs-btn{% if user_rating == num %} rs-active{% endif %}"
          data-isbn="{{ isbn }}"
          data-val="{{ num }}"
          onclick="rateBook('{{ isbn }}', {{ num }})"
          title="{{ num }}/10">{{ num }}</button>
  {% endwith %}
  {% endfor %}
  {% if user_rating %}
  <button class="rs-clear" onclick="rateBook('{{ isbn }}', null)" title="Зняти оцінку">×</button>
  {% endif %}
</div>
<style>
.rating-strip { display:flex; gap:2px; flex-wrap:wrap; justify-content:center; margin-top:5px; }
.rs-btn {
  width:20px; height:20px; border:1px solid #374151; border-radius:4px;
  background:none; color:#6b7280; font-size:.65rem; font-weight:700;
  cursor:pointer; padding:0; line-height:1; transition:background .1s, color .1s, transform .1s;
}
.rs-btn:hover { transform:scale(1.2); color:var(--text); }
.rs-btn[data-val="1"],.rs-btn[data-val="2"],.rs-btn[data-val="3"] { border-color:#7f1d1d; }
.rs-btn[data-val="1"]:hover,.rs-btn[data-val="2"]:hover,.rs-btn[data-val="3"]:hover { background:#7f1d1d; color:#fff; }
.rs-btn[data-val="4"],.rs-btn[data-val="5"],.rs-btn[data-val="6"] { border-color:#78350f; }
.rs-btn[data-val="4"]:hover,.rs-btn[data-val="5"]:hover,.rs-btn[data-val="6"]:hover { background:#78350f; color:#fff; }
.rs-btn[data-val="7"],.rs-btn[data-val="8"],.rs-btn[data-val="9"],.rs-btn[data-val="0"] { border-color:#14532d; }
.rs-btn[data-val="7"]:hover,.rs-btn[data-val="8"]:hover,.rs-btn[data-val="9"]:hover,.rs-btn[data-val="0"]:hover { background:#14532d; color:#fff; }
/* Активний стан */
.rs-btn.rs-active[data-val="1"],.rs-btn.rs-active[data-val="2"],.rs-btn.rs-active[data-val="3"] { background:#ef4444; border-color:#ef4444; color:#fff; }
.rs-btn.rs-active[data-val="4"],.rs-btn.rs-active[data-val="5"],.rs-btn.rs-active[data-val="6"] { background:#f59e0b; border-color:#f59e0b; color:#000; }
.rs-btn.rs-active[data-val="7"],.rs-btn.rs-active[data-val="8"],.rs-btn.rs-active[data-val="9"],.rs-btn.rs-active[data-val="0"] { background:#22c55e; border-color:#22c55e; color:#000; }
.rs-clear { width:20px; height:20px; border:1px solid #374151; border-radius:4px; background:none; color:#4b5563; font-size:.75rem; cursor:pointer; padding:0; line-height:1; }
.rs-clear:hover { background:#374151; color:#fff; }
</style>
